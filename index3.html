<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Store - MacBook Neo</title>
</head>
<body>

    <header class="top-banner">
        <p>
            Chọn quốc gia hoặc khu vực để xem nội dung phù hợp: 
            <strong>Việt Nam</strong>
        </p>
        <button type="button">Tiếp tục</button>
    </header>

    <nav class="main-menu">
        <ul style="list-style: none; display: flex; gap: 15px;">
            <li>Cửa hàng</li>
            <li>Mac</li>
            <li>iPad</li>
            <li>iPhone</li>
            <li>Watch</li>
            <li>AirPods</li>

            <li>Phụ kiện</li>
            <li>Hỗ trợ</li>
        </ul>
    </nav>

    <main class="product-hero">
        <section class="intro-text">
            <h1>MacBook Neo</h1>
            <p>Sức mạnh tuyệt vời. Mức giá bất ngờ.</p>
            
            <div class="cta-links">
                <a href="#">Tìm hiểu thêm</a> &nbsp;
                <a href="#">Mua ngay</a>
            </div>
        </section>

        <figure class="product-image">
            <img src="macbook-neo.jpg" alt="Hình ảnh MacBook Neo mới" width="600">
        </figure>
    </main>

</html>
